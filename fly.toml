# fly.toml — Fly.io Deployment Configuration for BlockVote Backend
# App URL: https://blockchain300809-api.fly.dev

app            = "blockchain300809-api"
primary_region = "sin"   # Singapore — closest to Bangladesh

[build]
  dockerfile = "Dockerfile"

[env]
  PORT      = "3000"
  NODE_ENV  = "production"
  DATA_DIR  = "/data"
  ADMIN_ID  = "admin"
  AGENT_ID  = "agent"

# HTTP service config
[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = false  # NEVER sleep — always running!
  auto_start_machines = true
  min_machines_running = 1

  # Allow WebSocket upgrades
  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

# Persistent volume for blockchain data
[[mounts]]
  source      = "blockvote_data"
  destination = "/data"

# Machine size (free tier)
[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"
